<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<header class="header">
    <div class="header-content">

        <h1>Admin Dashboard</h1>

        <div>
            <span id="adminName">Admin</span>

            <button id="logoutBtn" class="btn btn-danger">
                Logout
            </button>
        </div>

    </div>
</header>

<div class="container">

    <aside class="sidebar">

        <button class="nav-item active"
                data-section="dashboard">
            Dashboard
        </button>

        <button class="nav-item"
                data-section="users">
            Users
        </button>

        <button class="nav-item"
                data-section="moderators">
            Moderators
        </button>

    </aside>

    <main class="main-content">

        <!-- DASHBOARD -->

        <section id="dashboard" class="section active">

            <h2>Dashboard</h2>

            <div class="stats-grid">

                <div class="stat-card">
                    <h3>Total Users</h3>
                    <p id="totalUsers">0</p>
                </div>

                <div class="stat-card">
                    <h3>Total Moderators</h3>
                    <p id="totalModerators">0</p>
                </div>

            </div>

        </section>

        <!-- USERS -->

        <section id="users" class="section">

            <h2>Users</h2>

            <table class="data-table">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="usersTableBody"></tbody>

            </table>

        </section>

        <!-- MODERATORS -->

        <section id="moderators" class="section">

            <h2>Create Moderator</h2>

            <form id="createModeratorForm">

                <input
                        type="text"
                        id="moderatorName"
                        placeholder="Name"
                        required
                >

                <input
                        type="email"
                        id="moderatorEmail"
                        placeholder="Email"
                        required
                >

                <input
                        type="password"
                        id="moderatorPassword"
                        placeholder="Password"
                        required
                >

                <button type="submit">
                    Create Moderator
                </button>

            </form>

        </section>

    </main>

</div>

<script src="assets/js/admin.js"></script>

</body>
</html>
