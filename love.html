<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قلب كبير بالنجوم والقلوب</title>
    <style>
        /* إعدادات الصفحة والخلفية */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0b1a; /* خلفية داكنة لإبراز الألوان */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        /* تنسيق العناصر الصغيرة (القلوب والنجوم) */
        .particle {
            position: absolute;
            font-size: 20px;
            /* تأثير حركي ناعم ومرن عند التجمع */
            transition: all 2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            user-select: none;
            pointer-events: none;
        }

        /* حركة نبض بسيطة للقلب بعد أن يتشكل */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        #heart-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* سيتم تفعيل النبض برمجياً بعد تجمع القلوب */
        }
        
        .pulse {
            animation: heartbeat 2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const numParticles = 400; // عدد العناصر الصغيرة (يمكنك زيادته أو نقصانه)
        const symbols = ['❤️', '💖', '✨', '⭐', '💕']; // الأشكال المستخدمة

        // الحصول على مركز الشاشة
        let centerX = window.innerWidth / 2;
        let centerY = window.innerHeight / 2;

        // تحديث المركز عند تغيير حجم النافذة
        window.addEventListener('resize', () => {
            centerX = window.innerWidth / 2;
            centerY = window.innerHeight / 2;
        });

        // إنشاء العناصر الصغيرة
        for (let i = 0; i < numParticles; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // اختيار شكل عشوائي من المصفوفة
            particle.innerText = symbols[Math.floor(Math.random() * symbols.length)];

            // تحديد نقطة بداية عشوائية خارج الشاشة أو في أماكن متفرقة
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;

            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;

            container.appendChild(particle);

            // حساب الإحداثيات لتشكيل القلب باستخدام المعادلة الرياضية للقلب
            // t تأخذ قيماً من 0 إلى 2π
            const t = (i / numParticles) * Math.PI * 2;
            const scale = 18; // حجم القلب الكلي

            // معادلة القلب الرياضية
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

            // إضافة تشتت بسيط حتى لا يكون الخط رفيعاً جداً
            const scatterX = (Math.random() - 0.5) * 20;
            const scatterY = (Math.random() - 0.5) * 20;

            const targetX = centerX + (x * scale) + scatterX;
            const targetY = centerY + (y * scale) + scatterY;

            // تشغيل الحركة بتأخير زمني تدريجي (Staggered effect)
            setTimeout(() => {
                particle.style.left = `${targetX}px`;
                particle.style.top = `${targetY}px`;
                // تكبير الحجم قليلاً مع تدوير عشوائي بسيط
                const randomRotation = Math.random() * 360;
                particle.style.transform = `translate(-50%, -50%) scale(${Math.random() * 0.8 + 0.5}) rotate(${randomRotation}deg)`;
                particle.style.opacity = '1';
            }, i * 15); // 15 مللي ثانية بين كل قلب والذي يليه
        }

        // إضافة تأثير النبض للقلب بأكمله بعد انتهاء الحركة
        setTimeout(() => {
            container.classList.add('pulse');
        }, numParticles * 15 + 2000); // وقت التأخير + وقت الحركة

    </script>
</body>
</html>
